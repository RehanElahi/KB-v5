<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1D9E75" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kya Banaun" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Kya Banaun Aaj?</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-lightest: #E1F5EE;
      --green-light:    #9FE1CB;
      --green-mid:      #1D9E75;
      --green-dark:     #0F6E56;
      --amber-bg:       #FAEEDA;
      --amber-text:     #854F0B;
      --red-bg:         #FCEBEB;
      --red-text:       #A32D2D;
      --text-primary:   #1a1a1a;
      --text-secondary: #666;
      --text-hint:      #999;
      --bg-page:        #f5f4f0;
      --bg-card:        #ffffff;
      --bg-surface:     #f0eeea;
      --border:         rgba(0,0,0,0.10);
      --border-mid:     rgba(0,0,0,0.18);
      --radius-md:      12px;
      --radius-lg:      16px;
      --radius-pill:    999px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text-primary:   #f0efeb;
        --text-secondary: #a0a09a;
        --text-hint:      #6a6a65;
        --bg-page:  #141412;
        --bg-card:  #1e1e1a;
        --bg-surface: #252520;
        --border: rgba(255,255,255,0.09);
        --border-mid: rgba(255,255,255,0.15);
        --green-lightest: #063425;
        --green-light: #0a4a35;
        --amber-bg: #2e1f05;
        --amber-text: #FAC775;
        --red-bg: #2b0f0f;
        --red-text: #F09595;
      }
    }
    html, body { height: 100%; background: var(--bg-page); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: var(--text-primary); -webkit-font-smoothing: antialiased; }
    body { display: flex; flex-direction: column; min-height: 100vh; min-height: -webkit-fill-available; }
    .app-header { background: var(--green-dark); padding: env(safe-area-inset-top, 0) 0 0; flex-shrink: 0; }
    .header-inner { padding: 18px 20px 16px; display: flex; align-items: center; gap: 12px; }
    .header-icon { font-size: 28px; }
    .header-text h1 { font-size: 20px; font-weight: 600; color: white; }
    .header-text p { font-size: 13px; color: rgba(255,255,255,0.72); }
    .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 16px calc(env(safe-area-inset-bottom, 0) + 120px); }
    .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-hint); margin: 18px 0 8px; }
    .input-row { display: flex; gap: 8px; }
    .input-row input { flex: 1; height: 44px; padding: 0 14px; background: var(--bg-card); border: 1px solid var(--border-mid); border-radius: var(--radius-md); font-size: 16px; color: var(--text-primary); outline: none; }
    .add-btn { height: 44px; padding: 0 18px; background: var(--bg-card); border: 1px solid var(--border-mid); border-radius: var(--radius-md); font-size: 15px; font-weight: 500; color: var(--green-dark); cursor: pointer; }
    .quick-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { padding: 6px 11px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-pill); cursor: pointer; display: flex; flex-direction: column; }
    .chip.added { background: var(--green-lightest); border-color: var(--green-light); }
    .chip .en { font-size: 13px; font-weight: 500; }
    .chip .ur { font-size: 11px; color: var(--text-hint); }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { height: 34px; padding: 0 6px 0 12px; background: var(--green-lightest); border-radius: var(--radius-pill); font-size: 13px; color: var(--green-dark); display: flex; align-items: center; gap: 4px; }
    .tag button { width: 22px; height: 22px; border: none; background: transparent; cursor: pointer; font-size: 16px; color: var(--green-dark); }
    .find-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px calc(env(safe-area-inset-bottom, 0) + 12px); background: var(--bg-page); border-top: 1px solid var(--border); }
    .find-btn { width: 100%; height: 52px; background: var(--green-mid); color: white; border: none; border-radius: var(--radius-lg); font-size: 16px; font-weight: 600; cursor: pointer; }
    .find-btn:disabled { background: var(--bg-surface); color: var(--text-hint); }
    .loading { text-align: center; padding: 2.5rem 1rem; color: var(--text-secondary); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--green-mid); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .recipe-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 10px; overflow: hidden; }
    .recipe-header { padding: 14px 16px; cursor: pointer; display: flex; gap: 10px; }
    .recipe-emoji { font-size: 26px; }
    .recipe-info { flex: 1; }
    .recipe-name { font-size: 15px; font-weight: 600; }
    .recipe-badge { padding: 2px 8px; border-radius: var(--radius-pill); font-size: 11px; font-weight: 500; margin-top: 4px; display: inline-block; }
    .badge-ready { background: var(--green-lightest); color: var(--green-dark); }
    .badge-needs { background: var(--amber-bg); color: var(--amber-text); }
    .recipe-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
    .recipe-card.open .recipe-body { display: block; }
    .body-section { margin-top: 14px; }
    .body-title { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-hint); margin-bottom: 4px; }
    .body-section ul, .body-section ol { padding-left: 1.2rem; font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
    .error-box { background: var(--red-bg); color: var(--red-text); border-radius: var(--radius-md); padding: 14px; font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-icon">🍳</div>
    <div class="header-text">
      <h1>Kya Banaun Aaj?</h1>
      <p>Your fridge ingredients, desi recipes</p>
    </div>
  </div>
</header>

<div class="scroll-area">
  <div class="section-label">What's in your fridge?</div>
  <div class="input-row">
    <input type="text" id="ing-input" placeholder="e.g. chicken, aloo..." />
    <button class="add-btn" onclick="addIng()">Add</button>
  </div>
  <div class="section-label">Quick add</div>
  <div class="quick-chips" id="chips">
    <span class="chip" onclick="qa(this,'chicken')"><span class="en">Chicken</span><span class="ur">مرغی</span></span>
    <span class="chip" onclick="qa(this,'potatoes')"><span class="en">Potatoes</span><span class="ur">آلو</span></span>
    <span class="chip" onclick="qa(this,'eggs')"><span class="en">Eggs</span><span class="ur">انڈے</span></span>
    <span class="chip" onclick="qa(this,'onion')"><span class="en">Onion</span><span class="ur">پیاز</span></span>
    <span class="chip" onclick="qa(this,'tomatoes')"><span class="en">Tomatoes</span><span class="ur">ٹماٹر</span></span>
    <span class="chip" onclick="qa(this,'rice')"><span class="en">Rice</span><span class="ur">چاول</span></span>
    <span class="chip" onclick="qa(this,'yogurt')"><span class="en">Yogurt</span><span class="ur">دہی</span></span>
  </div>
  <div class="section-label">Selected</div>
  <div class="tags" id="tags"></div>
  <div id="results"></div>
</div>

<div class="find-bar">
  <button class="find-btn" id="find-btn" onclick="findRecipes()" disabled>Add ingredients to start</button>
</div>

<script>
  // UPDATED: Standard v1beta endpoint with explicitly correct model string
  const KEY = 'AIzaSyB5dVIYhWERDZ5Jfb0IEDQv2P3B2WOKMLg';
  const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;

  let ings = [];
  const input = document.getElementById('ing-input');
  const tagsEl = document.getElementById('tags');
  const findBtn = document.getElementById('find-btn');
  const resultsEl = document.getElementById('results');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') addIng(); });

  function addIng() {
    const v = input.value.trim().toLowerCase();
    if (!v || ings.includes(v)) { input.value = ''; return; }
    ings.push(v); input.value = ''; render();
  }

  function qa(el, item) {
    if (ings.includes(item)) { ings = ings.filter(i => i !== item); el.classList.remove('added'); }
    else { ings.push(item); el.classList.add('added'); }
    render();
  }

  function rem(item) {
    ings = ings.filter(i => i !== item);
    document.querySelectorAll('.chip').forEach(el => { if (el.innerText.toLowerCase().includes(item)) el.classList.remove('added'); });
    render();
  }

  function render() {
    tagsEl.innerHTML = ings.map(i => `<span class="tag">${i}<button onclick="rem('${i}')">×</button></span>`).join('');
    findBtn.disabled = ings.length === 0;
    findBtn.textContent = ings.length ? `Find recipes (${ings.length}) →` : 'Add ingredients to start';
  }

  async function findRecipes() {
    resultsEl.innerHTML = `<div class="loading"><div class="spinner"></div>Looking for recipes...</div>`;
    findBtn.disabled = true;

    const prompt = `User has: ${ings.join(', ')}. Pantry staples available. Suggest 4 Pakistani recipes. 
    Respond ONLY with a JSON array: [{"name":"Name (Urdu)","time":"X min","missing":[],"ingredients":[],"steps":[]}]`;

    try {
      const res = await fetch(URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.candidates[0].content.parts[0].text;
      const recipes = JSON.parse(text.replace(/```json|```/g, '').trim());
      
      resultsEl.innerHTML = recipes.map((r, i) => `
        <div class="recipe-card" onclick="this.classList.toggle('open')">
          <div class="recipe-header">
            <div class="recipe-emoji">🍲</div>
            <div class="recipe-info">
              <div class="recipe-name">${r.name}</div>
              <div class="recipe-badge ${r.missing.length ? 'badge-needs' : 'badge-ready'}">${r.missing.length ? 'Needs items' : 'Ready to cook'}</div>
            </div>
          </div>
          <div class="recipe-body">
            <div class="body-section"><div class="body-title">Ingredients</div><ul>${r.ingredients.map(x=>`<li>${x}</li>`).join('')}</ul></div>
            <div class="body-section"><div class="body-title">Steps</div><ol>${r.steps.map(x=>`<li>${x}</li>`).join('')}</ol></div>
          </div>
        </div>`).join('');
    } catch (err) {
      resultsEl.innerHTML = `<div class="error-box"><b>Connection Error</b><br>${err.message}</div>`;
    }
    findBtn.disabled = false;
  }

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
